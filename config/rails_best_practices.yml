# Disabled: predates strong parameters (Rails 4+). attr_accessible/attr_protected
# were removed from Rails core; mass assignment is protected via
# ActionController::Parameters#permit at the controller boundary instead
# (see params.expect in ProjectsController/TasksController).
#ProtectMassAssignmentCheck: { }
