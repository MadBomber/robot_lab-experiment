# request_cancel is a private helper genuinely called by #stop and #abandon,
# but this check (same unreliable heuristic as the models one below) misses it.
RemoveUnusedMethodsInControllersCheck: { except_methods: ['TasksController#request_cancel'] }
RemoveUnusedMethodsInHelpersCheck: { except_methods: [] }
# Both of these are genuinely used (runnable_agent_types from the _task_header
# ERB view, unblock! from TasksController#unblock) but this check's heuristic
# doesn't see the calls and false-positives them as unused -- it's unreliable
# enough that an unrelated refactor can flip its verdict. See notes in that PR.
RemoveUnusedMethodsInModelsCheck: { except_methods: ['Task#runnable_agent_types', 'Task#unblock!'] }
